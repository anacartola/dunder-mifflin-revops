name: CI

# Proves the "downloads and runs on any machine" promise: on every push,
# a clean Linux runner installs the locked dependencies and executes the
# analysis notebook end-to-end. A green badge means it really ran.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  run-notebook:
    name: Run the analysis notebook
    runs-on: ubuntu-latest

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-in-project: true

      - name: Use Python 3.12 for the project virtualenv
        run: poetry env use python

      - name: Install locked dependencies
        run: poetry install --no-interaction

      - name: Register a Jupyter kernel named "python3"
        run: poetry run python -m ipykernel install --user --name python3 --display-name "Python 3"

      - name: Execute the notebook end-to-end
        run: >
          poetry run jupyter nbconvert
          --to notebook --execute
          --ExecutePreprocessor.timeout=180
          --output executed.ipynb
          notebooks/revops_analysis.ipynb
